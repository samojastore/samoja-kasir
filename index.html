<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMOJA Kasir - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#111;color:#fff;font-family:Arial;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .container{max-width:1200px;width:100%;background:#1e1e1e;border-radius:30px;padding:40px 30px;text-align:center}
        h1{color:#684f36;margin-bottom:15px;font-size:2.5rem}
        .sub{color:#aaa;margin-bottom:40px}
        .menu{display:flex;flex-wrap:wrap;gap:25px;justify-content:center}
        .card{background:#2a2a2a;border-radius:24px;padding:30px 20px;width:220px;text-decoration:none;color:#fff;transition:0.3s;border:1px solid #444}
        .card:hover{transform:translateY(-8px);border-color:#684f36;background:#333}
        .card i{font-size:54px;color:#684f36;margin-bottom:15px}
        .card h3{font-size:22px;margin-bottom:8px}
        .card p{font-size:13px;color:#aaa}
        footer{margin-top:50px;font-size:12px;color:#555}
        @media (max-width:700px){.card{width:180px;padding:20px}.card i{font-size:42px}.card h3{font-size:18px}}
    </style>
</head>
<body>
<div class="container">
    <i class="fas fa-cash-register" style="font-size:70px;color:#684f36;margin-bottom:10px"></i>
    <h1>SAMOJA Kasir</h1>
    <div class="sub">Sistem Manajemen Penjualan & Pengeluaran</div>
    <div class="menu">
        <a href="sales.html" class="card"><i class="fas fa-chart-simple"></i><h3>Penjualan</h3><p>Catat penjualan produk (ready & custom)</p></a>
        <a href="expenses.html" class="card"><i class="fas fa-arrow-down"></i><h3>Pengeluaran</h3><p>Catat biaya operasional & stok</p></a>
        <a href="income.html" class="card"><i class="fas fa-chart-line"></i><h3>Penghasilan</h3><p>Lihat laba/rugi bersih</p></a>
        <a href="addproduct.html" class="card"><i class="fas fa-boxes"></i><h3>Kelola Produk</h3><p>Tambah/edit produk jadi</p></a>
    </div>
    <footer>© 2026 SAMOJA Apparel</footer>
</div>
</body>
</html>
