<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir SAMOJA - Penghasilan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="sales.css"> <!-- reuse style -->
    <style>
        .income-card{background:#2a2a2a;padding:25px;border-radius:20px;text-align:center;margin-bottom:30px}
        .income-card h2{color:#684f36;margin-bottom:15px}
        .income-number{font-size:2.5rem;font-weight:bold}
        .profit{color:#28a745}
        .loss{color:#dc3545}
        button{margin-top:20px}
    </style>
</head>
<body>
<div class="container">
    <div class="nav-buttons">
        <a href="sales.html" class="nav-btn">Penjualan</a>
        <a href="expenses.html" class="nav-btn">Pengeluaran</a>
        <a href="income.html" class="nav-btn active">Penghasilan</a>
        <a href="addproduct.html" class="nav-btn">Kelola Produk</a>
    </div>
    <h1><i class="fas fa-chart-line"></i> Kasir SAMOJA - Penghasilan</h1>
    <div class="income-card"><h2>Total Penjualan</h2><div id="totalSales" class="income-number">Rp 0</div></div>
    <div class="income-card"><h2>Total Pengeluaran</h2><div id="totalExpenses" class="income-number">Rp 0</div></div>
    <div class="income-card"><h2>Laba Bersih</h2><div id="netIncome" class="income-number">Rp 0</div></div>
    <div style="text-align:center"><button onclick="refreshData()">Refresh Data</button></div>
</div>
<script>
    function formatRupiah(angka){ return "Rp "+angka.toLocaleString(); }
    function refreshData(){
        let sales = JSON.parse(localStorage.getItem("samoja_sales")||"[]");
        let expenses = JSON.parse(localStorage.getItem("samoja_expenses")||"[]");
        let totalSales = sales.reduce((s,o)=>s+o.total,0);
        let totalExpenses = expenses.reduce((s,o)=>s+o.amount,0);
        let net = totalSales - totalExpenses;
        document.getElementById("totalSales").innerText = formatRupiah(totalSales);
        document.getElementById("totalExpenses").innerText = formatRupiah(totalExpenses);
        let netEl = document.getElementById("netIncome");
        netEl.innerText = formatRupiah(net);
        netEl.className = "income-number " + (net>=0?"profit":"loss");
    }
    window.addEventListener("DOMContentLoaded", refreshData);
</script>
</body>
</html>
